version: '3.8'

services:
  # ─── Message Broker ───────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rps-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    environment:
      RABBITMQ_DEFAULT_USER: rps_user
      RABBITMQ_DEFAULT_PASS: rps_password
      RABBITMQ_DEFAULT_VHOST: rps_vhost
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rps-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (2 instances for load balancing demo) ────────────
  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rps-backend-1
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost
      RABBITMQ_URL: amqp://rps_user:rps_password@rabbitmq:5672/rps_vhost
      INSTANCE_ID: backend-1
    volumes:
      - backend_data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rps-network
    restart: unless-stopped

  backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rps-backend-2
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost
      RABBITMQ_URL: amqp://rps_user:rps_password@rabbitmq:5672/rps_vhost
      INSTANCE_ID: backend-2
    volumes:
      - backend_data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rps-network
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rps-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_WS_URL: http://localhost
    networks:
      - rps-network
    restart: unless-stopped

  # ─── API Gateway + Load Balancer (Nginx) ──────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: rps-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx-base.conf:/etc/nginx/conf.d/00-base.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - frontend
    networks:
      - rps-network
    restart: unless-stopped

  # ─── Service Monitoring ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rps-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - rps-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: rps-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - rps-network
    restart: unless-stopped

networks:
  rps-network:
    driver: bridge

volumes:
  rabbitmq_data:
  backend_data:
  grafana_data:
