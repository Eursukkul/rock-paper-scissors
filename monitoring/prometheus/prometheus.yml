global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'rps-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'rps-backend-1'
    static_configs:
      - targets: ['backend-1:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'rps-backend-2'
    static_configs:
      - targets: ['backend-2:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    scrape_interval: 15s
