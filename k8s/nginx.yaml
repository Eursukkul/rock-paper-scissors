apiVersion: apps/v1
kind: Deployment
metadata:
  name: rps-nginx
  namespace: rock-paper-scissors
  labels:
    app: rps-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rps-nginx
  template:
    metadata:
      labels:
        app: rps-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: nginx-config
          configMap:
            name: rps-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: rps-nginx-svc
  namespace: rock-paper-scissors
spec:
  selector:
    app: rps-nginx
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rps-ingress
  namespace: rock-paper-scissors
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: rps.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rps-nginx-svc
                port:
                  number: 80
