apiVersion: apps/v1
kind: Deployment
metadata:
  name: rps-frontend
  namespace: rock-paper-scissors
  labels:
    app: rps-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rps-frontend
  template:
    metadata:
      labels:
        app: rps-frontend
    spec:
      containers:
        - name: frontend
          image: rock-paper-scissors-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: rps-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: rps-config
                  key: NEXT_PUBLIC_WS_URL
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rps-frontend-svc
  namespace: rock-paper-scissors
spec:
  selector:
    app: rps-frontend
  ports:
    - port: 3000
      targetPort: 3000
