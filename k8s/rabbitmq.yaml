apiVersion: apps/v1
kind: Deployment
metadata:
  name: rps-rabbitmq
  namespace: rock-paper-scissors
  labels:
    app: rps-rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rps-rabbitmq
  template:
    metadata:
      labels:
        app: rps-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rps-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rps-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: RABBITMQ_DEFAULT_VHOST
              valueFrom:
                secretKeyRef:
                  name: rps-secrets
                  key: RABBITMQ_DEFAULT_VHOST
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rps-rabbitmq-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rps-rabbitmq-svc
  namespace: rock-paper-scissors
spec:
  selector:
    app: rps-rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rps-rabbitmq-pvc
  namespace: rock-paper-scissors
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
