apiVersion: apps/v1
kind: Deployment
metadata:
  name: rps-prometheus
  namespace: rock-paper-scissors
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rps-prometheus
  template:
    metadata:
      labels:
        app: rps-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: prometheus-config
          configMap:
            name: rps-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: rps-prometheus-svc
  namespace: rock-paper-scissors
spec:
  selector:
    app: rps-prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rps-grafana
  namespace: rock-paper-scissors
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rps-grafana
  template:
    metadata:
      labels:
        app: rps-grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rps-grafana-svc
  namespace: rock-paper-scissors
spec:
  selector:
    app: rps-grafana
  ports:
    - port: 3002
      targetPort: 3000
